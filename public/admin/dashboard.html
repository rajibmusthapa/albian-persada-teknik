<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Dashboard Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
  <nav class="bg-blue-900 text-white p-4">
    <div class="container mx-auto flex justify-between">
      <h1 class="text-xl font-bold">Admin ALBIAN PERSADA TEKNIK</h1>
      <button id="logoutBtn" class="bg-red-600 px-3 py-1 rounded">Logout</button>
    </div>
  </nav>
  <div class="container mx-auto p-6">
    <h2 class="text-2xl font-bold mb-6">Dashboard</h2>
    <div class="grid md:grid-cols-3 gap-4">
      <div class="bg-white p-4 rounded shadow"><p class="text-3xl font-bold" id="totalProyek">-</p><p>Total Proyek</p></div>
      <div class="bg-white p-4 rounded shadow"><p class="text-3xl font-bold" id="totalStok">-</p><p>Total Stok</p></div>
      <div class="bg-white p-4 rounded shadow"><p class="text-3xl font-bold" id="totalCabang">-</p><p>Total Cabang</p></div>
    </div>
  </div>
  <script>
    const user = localStorage.getItem('adminUser');
    if (!user) window.location.href = 'login.html';
    document.getElementById('logoutBtn').onclick = () => { localStorage.removeItem('adminUser'); window.location.href = 'login.html'; };
    fetch('/api/dashboard').then(res => res.json()).then(data => {
      document.getElementById('totalProyek').textContent = data.totalProyek;
      document.getElementById('totalStok').textContent = data.totalStok;
      document.getElementById('totalCabang').textContent = data.totalCabang;
    });
  </script>
</body>
</html>
