<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Admin - ALBIAN PERSADA TEKNIK</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-gray-100">
  <div class="min-h-screen flex items-center justify-center">
    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md">
      <div class="text-center mb-8">
        <i class="fas fa-swimmer text-4xl text-blue-800"></i>
        <h1 class="text-2xl font-bold mt-2">ALBIAN PERSADA TEKNIK</h1>
        <p class="text-gray-500">Admin Panel</p>
      </div>
      <form id="loginForm">
        <div class="mb-4">
          <label class="block text-gray-700 mb-2">Username</label>
          <input type="text" id="username" class="w-full p-3 border rounded-lg" required>
        </div>
        <div class="mb-6">
          <label class="block text-gray-700 mb-2">Password</label>
          <input type="password" id="password" class="w-full p-3 border rounded-lg" required>
        </div>
        <button type="submit" class="w-full bg-blue-800 text-white p-3 rounded-lg font-bold">Login</button>
      </form>
      <div id="errorMsg" class="mt-4 text-center text-red-600 hidden"></div>
    </div>
  </div>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();
      if (data.success) {
        localStorage.setItem('adminUser', JSON.stringify(data.user));
        window.location.href = 'dashboard.html';
      } else {
        document.getElementById('errorMsg').textContent = data.message;
        document.getElementById('errorMsg').classList.remove('hidden');
      }
    });
  </script>
</body>
</html>
