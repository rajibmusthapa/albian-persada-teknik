<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manajemen Stok - ALBIAN PERSADA TEKNIK</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-gray-100">
  <nav class="bg-blue-900 text-white p-4">
    <div class="container mx-auto flex justify-between items-center">
      <h1 class="text-xl font-bold"><i class="fas fa-swimmer mr-2"></i>ALBIAN PERSADA TEKNIK Admin</h1>
      <div class="space-x-4">
        <a href="dashboard.html" class="hover:text-yellow-400">Dashboard</a>
        <a href="proyek.html" class="hover:text-yellow-400">Proyek</a>
        <a href="stok.html" class="text-yellow-400">Stok</a>
        <a href="cabang.html" class="hover:text-yellow-400">Cabang</a>
        <a href="../index.html" class="hover:text-yellow-400">Website</a>
        <button id="logoutBtn" class="bg-red-600 px-3 py-1 rounded hover:bg-red-700">Logout</button>
      </div>
    </div>
  </nav>

  <div class="container mx-auto p-6">
    <div class="flex justify-between items-center mb-6">
      <h2 class="text-2xl font-bold">📦 Manajemen Stok Produk</h2>
      <button onclick="showModal()" class="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700">+ Tambah Produk</button>
    </div>

    <!-- Alert stok menipis -->
    <div id="alertStok" class="hidden mb-4 p-3 bg-yellow-100 border-l-4 border-yellow-500 text-yellow-700 rounded"></div>

    <div class="bg-white rounded-lg shadow overflow-hidden">
      <table class="w-full">
        <thead class="bg-gray-800 text-white">
          <tr>
            <th class="p-3">ID</th>
            <th class="p-3">Nama Produk</th>
            <th class="p-3">Kategori</th>
            <th class="p-3">Harga Jual</th>
            <th class="p-3">Stok</th>
            <th class="p-3">Satuan</th>
            <th class="p-3">Aksi</th>
          </tr>
        </thead>
        <tbody id="stokList"></tbody>
      </table>
    </div>
  </div>

  <!-- Modal Tambah/Edit -->
  <div id="modal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
    <div class="bg-white rounded-lg p-6 w-full max-w-md">
      <h3 id="modalTitle" class="text-xl font-bold mb-4">Tambah Produk</h3>
      <form id="stokForm">
        <input type="hidden" id="stokId">
        <div class="mb-3"><label class="block font-semibold">Nama Produk</label><input type="text" id="nama" class="w-full p-2 border rounded" required></div>
        <div class="mb-3"><label class="block font-semibold">Kategori</label>
          <select id="kategori" class="w-full p-2 border rounded">
            <option>Pompa</option><option>Filter</option><option>Keramik</option><option>Mozaik</option>
            <option>Aksesoris</option><option>Kolam Portable</option><option>Bahan Kimia</option><option>Jasa</option>
          </select>
        </div>
        <div class="mb-3"><label class="block font-semibold">Harga Jual (Rp)</label><input type="number" id="hargaJual" class="w-full p-2 border rounded" required></div>
        <div class="mb-3"><label class="block font-semibold">Stok</label><input type="number" id="stok" class="w-full p-2 border rounded" required></div>
        <div class="mb-3"><label class="block font-semibold">Satuan</label><input type="text" id="satuan" class="w-full p-2 border rounded" placeholder="unit, box, pcs, kg"></div>
        <div class="flex justify-end gap-2 mt-4"><button type="button" onclick="hideModal()" class="px-4 py-2 bg-gray-300 rounded">Batal</button><button type="submit" class="px-4 py-2 bg-blue-800 text-white rounded">Simpan</button></div>
      </form>
    </div>
  </div>

  <script>
    const user = localStorage.getItem('adminUser');
    if (!user) window.location.href = 'login.html';
    document.getElementById('logoutBtn').onclick = () => { localStorage.removeItem('adminUser'); window.location.href = 'login.html'; };

    let stokData = [];

    async function loadStok() {
      const res = await fetch('/api/stok');
      stokData = await res.json();
      const tbody = document.getElementById('stokList');
      tbody.innerHTML = stokData.map(s => {
        const stokAlert = s.stok < 10 ? 'text-red-600 font-bold' : '';
        return `
          <tr class="border-b">
            <td class="p-3">${s.id}</td>
            <td class="p-3 font-medium">${s.nama}</td>
            <td class="p-3"><span class="px-2 py-1 bg-gray-200 rounded-full text-xs">${s.kategori}</span></td>
            <td class="p-3">Rp ${s.hargaJual.toLocaleString()}</td>
            <td class="p-3 ${stokAlert}">${s.stok}</td>
            <td class="p-3">${s.satuan}</td>
            <td class="p-3"><button onclick="editStok(${s.id})" class="text-blue-600 mr-2"><i class="fas fa-edit"></i></button><button onclick="deleteStok(${s.id})" class="text-red-600"><i class="fas fa-trash"></i></button></td>
          </tr>
        `;
      }).join('');

      const menipis = stokData.filter(s => s.stok < 10);
      const alertDiv = document.getElementById('alertStok');
      if (menipis.length > 0) {
        alertDiv.classList.remove('hidden');
        alertDiv.innerHTML = `<i class="fas fa-exclamation-triangle mr-2"></i> ⚠️ ${menipis.length} produk stok menipis (stok < 10)!`;
      } else {
        alertDiv.classList.add('hidden');
      }
    }

    function showModal(id = null) {
      document.getElementById('modal').classList.remove('hidden');
      document.getElementById('modal').classList.add('flex');
      if (id) {
        document.getElementById('modalTitle').textContent = 'Edit Produk';
        const stok = stokData.find(s => s.id === id);
        if (stok) {
          document.getElementById('stokId').value = stok.id;
          document.getElementById('nama').value = stok.nama;
          document.getElementById('kategori').value = stok.kategori;
          document.getElementById('hargaJual').value = stok.hargaJual;
          document.getElementById('stok').value = stok.stok;
          document.getElementById('satuan').value = stok.satuan;
        }
      } else {
        document.getElementById('modalTitle').textContent = 'Tambah Produk';
        document.getElementById('stokForm').reset();
        document.getElementById('stokId').value = '';
      }
    }
    function hideModal() { document.getElementById('modal').classList.add('hidden'); document.getElementById('modal').classList.remove('flex'); }
    function editStok(id) { showModal(id); }
    async function deleteStok(id) { if(confirm('Yakin hapus produk ini?')){ await fetch(`/api/stok/${id}`,{method:'DELETE'}); loadStok(); } }
    document.getElementById('stokForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const id = document.getElementById('stokId').value;
      const data = {
        nama: document.getElementById('nama').value,
        kategori: document.getElementById('kategori').value,
        hargaJual: parseInt(document.getElementById('hargaJual').value),
        stok: parseInt(document.getElementById('stok').value),
        satuan: document.getElementById('satuan').value
      };
      if(id) await fetch(`/api/stok/${id}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
      else await fetch('/api/stok',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
      hideModal(); loadStok();
    });
    loadStok();
  </script>
</body>
</html>
