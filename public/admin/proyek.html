<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manajemen Proyek - ALBIAN PERSADA TEKNIK</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-gray-100">
  <nav class="bg-blue-900 text-white p-4">
    <div class="container mx-auto flex justify-between items-center">
      <h1 class="text-xl font-bold"><i class="fas fa-swimmer mr-2"></i>ALBIAN PERSADA TEKNIK Admin</h1>
      <div class="space-x-4">
        <a href="dashboard.html" class="hover:text-yellow-400">Dashboard</a>
        <a href="proyek.html" class="text-yellow-400">Proyek</a>
        <a href="stok.html" class="hover:text-yellow-400">Stok</a>
        <a href="cabang.html" class="hover:text-yellow-400">Cabang</a>
        <a href="../index.html" class="hover:text-yellow-400">Website</a>
        <button id="logoutBtn" class="bg-red-600 px-3 py-1 rounded hover:bg-red-700">Logout</button>
      </div>
    </div>
  </nav>

  <div class="container mx-auto p-6">
    <div class="flex justify-between items-center mb-6">
      <h2 class="text-2xl font-bold">📋 Manajemen Proyek</h2>
      <button onclick="showModal()" class="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700">+ Tambah Proyek</button>
    </div>

    <div class="bg-white rounded-lg shadow overflow-hidden">
      <table class="w-full">
        <thead class="bg-gray-800 text-white">
          <tr><th class="p-3">ID</th><th class="p-3">Nama</th><th class="p-3">Jenis</th><th class="p-3">Lokasi</th><th class="p-3">Status</th><th class="p-3">Aksi</th></tr>
        </thead>
        <tbody id="proyekList"></tbody>
      </table>
    </div>
  </div>

  <div id="modal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
    <div class="bg-white rounded-lg p-6 w-full max-w-md">
      <h3 id="modalTitle" class="text-xl font-bold mb-4">Tambah Proyek</h3>
      <form id="proyekForm">
        <input type="hidden" id="proyekId">
        <div class="mb-3"><label class="block font-semibold">Nama Proyek</label><input type="text" id="nama" class="w-full p-2 border rounded" required></div>
        <div class="mb-3"><label class="block font-semibold">Jenis</label><input type="text" id="jenis" class="w-full p-2 border rounded"></div>
        <div class="mb-3"><label class="block font-semibold">Ukuran</label><input type="text" id="ukuran" class="w-full p-2 border rounded"></div>
        <div class="mb-3"><label class="block font-semibold">Lokasi</label><input type="text" id="lokasi" class="w-full p-2 border rounded"></div>
        <div class="mb-3"><label class="block font-semibold">Status</label><select id="status" class="w-full p-2 border rounded"><option>Proses</option><option>Selesai</option></select></div>
        <div class="flex justify-end gap-2 mt-4"><button type="button" onclick="hideModal()" class="px-4 py-2 bg-gray-300 rounded">Batal</button><button type="submit" class="px-4 py-2 bg-blue-800 text-white rounded">Simpan</button></div>
      </form>
    </div>
  </div>

  <script>
    const user = localStorage.getItem('adminUser');
    if (!user) window.location.href = 'login.html';
    document.getElementById('logoutBtn').onclick = () => { localStorage.removeItem('adminUser'); window.location.href = 'login.html'; };

    async function loadProyek() {
      const res = await fetch('/api/proyek');
      const data = await res.json();
      const tbody = document.getElementById('proyekList');
      tbody.innerHTML = data.map(p => `
        <tr class="border-b">
          <td class="p-3">${p.id}</td>
          <td class="p-3 font-medium">${p.nama}</td>
          <td class="p-3">${p.jenis || '-'}</td>
          <td class="p-3">${p.lokasi || '-'}</td>
          <td class="p-3"><span class="px-2 py-1 rounded-full text-xs ${p.status === 'Selesai' ? 'bg-green-100 text-green-600' : 'bg-yellow-100 text-yellow-600'}">${p.status}</span></td>
          <td class="p-3"><button onclick="editProyek(${p.id})" class="text-blue-600 mr-2"><i class="fas fa-edit"></i></button><button onclick="deleteProyek(${p.id})" class="text-red-600"><i class="fas fa-trash"></i></button></td>
        </tr>
      `).join('');
    }

    function showModal(id = null) {
      document.getElementById('modal').classList.remove('hidden');
      document.getElementById('modal').classList.add('flex');
      if (id) {
        document.getElementById('modalTitle').textContent = 'Edit Proyek';
        fetch('/api/proyek').then(res => res.json()).then(data => {
          const proyek = data.find(p => p.id === id);
          if (proyek) {
            document.getElementById('proyekId').value = proyek.id;
            document.getElementById('nama').value = proyek.nama;
            document.getElementById('jenis').value = proyek.jenis || '';
            document.getElementById('ukuran').value = proyek.ukuran || '';
            document.getElementById('lokasi').value = proyek.lokasi || '';
            document.getElementById('status').value = proyek.status;
          }
        });
      } else {
        document.getElementById('modalTitle').textContent = 'Tambah Proyek';
        document.getElementById('proyekForm').reset();
        document.getElementById('proyekId').value = '';
      }
    }
    function hideModal() { document.getElementById('modal').classList.add('hidden'); document.getElementById('modal').classList.remove('flex'); }
    function editProyek(id) { showModal(id); }
    async function deleteProyek(id) { if(confirm('Yakin hapus?')){ await fetch(`/api/proyek/${id}`,{method:'DELETE'}); loadProyek(); } }
    document.getElementById('proyekForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const id = document.getElementById('proyekId').value;
      const data = { nama: document.getElementById('nama').value, jenis: document.getElementById('jenis').value, ukuran: document.getElementById('ukuran').value, lokasi: document.getElementById('lokasi').value, status: document.getElementById('status').value };
      if(id) await fetch(`/api/proyek/${id}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
      else await fetch('/api/proyek',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
      hideModal(); loadProyek();
    });
    loadProyek();
  </script>
</body>
</html>
